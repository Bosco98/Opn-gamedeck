name: Deploy Opn-gamedeck to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, skipping runs queued behind an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The console consumes the SDK via file:../sdk (same repo) — build it first.
      - name: Build SDK
        working-directory: sdk
        run: |
          npm ci
          npm run build

      # The games are separate repositories deployed to their own Pages sites;
      # the console references them in games.json. Only the shell ships here.
      # vite base "./" makes the build work at any subpath.
      - name: Build console shell
        working-directory: console
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: console/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
