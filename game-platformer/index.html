<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenControl Platformer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0b0d12; }

    /* The game is the page — fullscreen canvas, no chrome. */
    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #e8eaf0;
      pointer-events: none;
    }
    .join-card {
      background: rgba(12, 14, 20, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 36px 48px;
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }
    .join-card h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 4px; }
    .join-card p.sub { font-size: 13px; color: #9aa1af; margin-bottom: 20px; }
    .join-card .code {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 0.28em;
      margin: 12px 0 4px;
      padding-left: 0.28em; /* balance the letter-spacing */
      color: #7ee787;
    }
    .join-card .code-label { font-size: 11px; letter-spacing: 0.2em; color: #9aa1af; text-transform: uppercase; }
    #qr { margin: 20px auto 12px; width: 180px; height: 180px; background: #fff; border-radius: 12px; padding: 8px; display: none; }
    #qr.ready { display: block; }
    #qr canvas, #qr img { width: 100%; height: 100%; }
    .join-card .url { font-size: 13px; color: #7aa2ff; word-break: break-all; max-width: 340px; }
    .join-card .hint { margin-top: 16px; font-size: 12px; color: #6a7180; }
    .join-card .warn { margin-top: 10px; font-size: 12px; color: #ffb454; max-width: 340px; }

    /* Small corner HUD once the game is going */
    #hud {
      position: fixed;
      top: 12px;
      right: 12px;
      font-family: system-ui, sans-serif;
      background: rgba(12, 14, 20, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 8px 14px;
      color: #e8eaf0;
      font-size: 13px;
      display: none;
      pointer-events: none;
    }
    #hud .hud-code { font-weight: 800; letter-spacing: 0.14em; color: #7ee787; }
    #hud .hud-players { color: #9aa1af; margin-left: 8px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="overlay" id="join-overlay">
    <div class="join-card">
      <h1>OpenControl Platformer</h1>
      <p class="sub">Your phone is the controller</p>
      <div id="qr"></div>
      <div class="code-label">Room code</div>
      <div class="code" id="room-code">····</div>
      <div class="url" id="join-url"></div>
      <div class="hint">Scan the QR code or open the link on your phone</div>
      <div class="warn hidden" id="localhost-warn">
        You opened this page as <b>localhost</b> — phones can't reach that.
        Use the "Network" URL printed by server.mjs instead.
      </div>
    </div>
  </div>

  <div id="hud">
    <span class="hud-code" id="hud-code"></span>
    <span class="hud-players" id="hud-players"></span>
  </div>

  <!-- QR rendering (optional nicety — game works without it) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <!-- OpenControl SDK, script-tag build: exposes window.OpenControl -->
  <script src="/opencontrol.js"></script>
  <script src="game.js"></script>
</body>
</html>
