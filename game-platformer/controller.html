<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Controller — OpenControl Platformer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: #0a0b0e;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #e8eaf0;
    }
    #root { position: fixed; inset: 0; }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      text-align: center;
      background: #0a0b0e;
    }
    .screen h1 { font-size: 18px; font-weight: 700; }
    .screen p { font-size: 13px; color: #9aa1af; max-width: 300px; }
    .screen input {
      width: 200px;
      padding: 14px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.3em;
      text-align: center;
      text-transform: uppercase;
      color: #e8eaf0;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      outline: none;
    }
    .screen button {
      padding: 14px 42px;
      font-size: 15px;
      font-weight: 700;
      color: #0a0b0e;
      background: #7ee787;
      border: none;
      border-radius: 999px;
    }
    .screen button:active { filter: brightness(0.9); }
    .screen .error { color: #ff5a5f; font-size: 13px; min-height: 18px; }

    #status-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px calc(10px + env(safe-area-inset-top)) 10px;
      background: #b78708;
      color: #0a0b0e;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      z-index: 10;
      display: none;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status-banner">Reconnecting…</div>

  <div class="screen" id="join-screen">
    <h1>Join the game</h1>
    <p>Enter the room code shown on the big screen</p>
    <input id="code-input" maxlength="4" autocomplete="off" autocapitalize="characters" placeholder="ABCD" />
    <button id="join-btn">Join</button>
    <div class="error" id="join-error"></div>
  </div>

  <script src="/opencontrol.js"></script>
  <script>
    const joinScreen = document.getElementById("join-screen");
    const codeInput = document.getElementById("code-input");
    const joinBtn = document.getElementById("join-btn");
    const joinError = document.getElementById("join-error");
    const banner = document.getElementById("status-banner");
    const root = document.getElementById("root");

    const roomFromUrl = new URLSearchParams(location.search).get("room");
    if (roomFromUrl) {
      codeInput.value = roomFromUrl.toUpperCase();
      join(roomFromUrl);
    }

    joinBtn.addEventListener("click", () => join(codeInput.value));
    codeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") join(codeInput.value);
    });

    async function join(room) {
      room = room.trim();
      if (room.length < 4) {
        joinError.textContent = "Enter the 4-letter room code";
        return;
      }
      joinBtn.disabled = true;
      joinError.textContent = "";
      joinBtn.textContent = "Connecting…";
      try {
        const session = await OpenControl.join({
          room,
          controller: "classic",
          mount: root,
        });
        joinScreen.classList.add("hidden");
        keepAwake();

        session.on("disconnect", () => { banner.style.display = "block"; });
        session.on("reconnect", () => { banner.style.display = "none"; });
        session.on("close", ({ reason }) => {
          banner.style.display = "none";
          joinScreen.classList.remove("hidden");
          joinBtn.disabled = false;
          joinBtn.textContent = "Join";
          joinError.textContent =
            reason === "session-ended" ? "The host ended the game" :
            reason === "lost" ? "Connection lost" : "";
        });
      } catch (err) {
        joinBtn.disabled = false;
        joinBtn.textContent = "Join";
        joinError.textContent =
          err && err.name === "RoomNotFoundError" ? "No game found for that code" :
          err && err.name === "JoinRejectedError" ? "The game is full" :
          "Could not connect — try again";
        console.error(err);
      }
    }

    // Keep the phone screen on while playing (best effort).
    async function keepAwake() {
      try {
        if (navigator.wakeLock) await navigator.wakeLock.request("screen");
      } catch { /* not critical */ }
    }
  </script>
</body>
</html>
